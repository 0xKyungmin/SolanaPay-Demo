publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  solana: ^0.32.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
